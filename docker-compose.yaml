
services:
  pytorch:
    build: .
    container_name: pytorch
    stdin_open: true
    tty: true
    ipc: host
    user: "${UID}:${GID}"
    volumes:
       - ./:/bench
       - ${CUDA_MPS_PIPE_DIRECTORY}:${CUDA_MPS_PIPE_DIRECTORY}
       - /scratch/lhblago:/scratch/lhblago
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_MPS_PIPE_DIRECTORY=${CUDA_MPS_PIPE_DIRECTORY}
      - CUDA_VISIBLE_DEVICES=0
    ulimits:
      memlock: -1
      stack: 67108864